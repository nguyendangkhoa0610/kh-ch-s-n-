[build]
builder = "nixpacks"
buildCommand = "npx --yes pnpm@11.5.0 install --frozen-lockfile && npx pnpm@11.5.0 -C packages/database db:generate && npx pnpm@11.5.0 -C api build"

[deploy]
startCommand = "node api/dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
